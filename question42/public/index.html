    <!--Create an HTML page with a form containing:

Full Name (text)
Email Address (email)
Message (textarea)
A submit button
-->

    <h1> Submit Info & Store Memory </h1>
    <p>Please enter in your information below</p><br>


    <form id="input-form">


        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="msg">Message:</label><br>
        <textarea id="msg" name="msg" rows="5" cols="30">

        </textarea><br><br>

        <input type="submit" value="Submit">

    </form>
    </form>

</body>

<script>
    document.getElementById("input-form").addEventListener("submit", function (e) {
                e.preventDefault();
                postMessage();
            });
            async function postMessage() {
                const text = document.getElementById(
                    'name').value;
                const author = document.getElementById(
                    'email').value;
                const message = document.getElementById(
                    'msg').value;
                try {
                    const response = await fetch(
                        '/users', {
                        method: 'POST',
                        headers: {
                            'Content-Type':
                                'application/json'
                        },
                        body: JSON.stringify(
                            { text, author })
                    });
                    if (!response.ok) {
                        const errData =
                            await response.json();
                        throw new Error(errData.error);
                    }

                    const newMsg =
                        await response.json();

                    const getResponse = await fetch('/users');

                    if (!getResponse.ok) {
                        throw new Error('Failed to fetch messages');
                    }

                    const messages = await getResponse.json();
                }

                 catch (error) {
                    console.log("Something is wrong.")
                }
            }
</script>
